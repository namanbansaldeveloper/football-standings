<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Euro Football Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .crest { width: 22px; margin-right: 10px; vertical-align: middle; }
        .table-sm td, .table-sm th { font-size: 0.85rem; padding: 10px; vertical-align: middle; }
        .nav-pills .nav-link.active { background-color: #1a1a1a; color: white; border-radius: 20px; }
        .nav-link { color: #444; font-weight: 500; transition: 0.3s; }
        .card { border: none; border-radius: 12px; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark bg-dark mb-4 shadow-sm">
        <div class="container">
            <span class="navbar-brand mb-0 h1">⚽ Football Live Microsite</span>
        </div>
    </nav>

    <div class="container pb-5">
        <ul class="nav nav-pills mb-4 justify-content-center bg-white p-2 rounded-pill shadow-sm" id="pills-tab" role="tablist">
            <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#pl">Premier League</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#laliga">La Liga</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#seriea">Serie A</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#bundes">Bundesliga</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#cl">Champions League</button></li>
        </ul>

        <div class="tab-content">
            <div class="tab-pane fade show active" id="pl">
                <div class="row g-4">
                    <div class="col-lg-8"><div class="card shadow-sm p-3"><h5>Standings</h5><div id="pl-table">Loading...</div></div></div>
                    <div class="col-lg-4"><div class="card shadow-sm p-3"><h5>Top Scorers</h5><div id="pl-scorers">Loading...</div></div></div>
                </div>
            </div>

            <div class="tab-pane fade" id="laliga">
                <div class="row g-4">
                    <div class="col-lg-8"><div class="card shadow-sm p-3"><h5>Standings</h5><div id="laliga-table">Loading...</div></div></div>
                    <div class="col-lg-4"><div class="card shadow-sm p-3"><h5>Top Scorers</h5><div id="laliga-scorers">Loading...</div></div></div>
                </div>
            </div>

            <div class="tab-pane fade" id="seriea">
                <div class="row g-4">
                    <div class="col-lg-8"><div class="card shadow-sm p-3"><h5>Standings</h5><div id="seriea-table">Loading...</div></div></div>
                    <div class="col-lg-4"><div class="card shadow-sm p-3"><h5>Top Scorers</h5><div id="seriea-scorers">Loading...</div></div></div>
                </div>
            </div>

            <div class="tab-pane fade" id="bundes">
                <div class="row g-4">
                    <div class="col-lg-8"><div class="card shadow-sm p-3"><h5>Standings</h5><div id="bundes-table">Loading...</div></div></div>
                    <div class="col-lg-4"><div class="card shadow-sm p-3"><h5>Top Scorers</h5><div id="bundes-scorers">Loading...</div></div></div>
                </div>
            </div>

            <div class="tab-pane fade" id="cl">
                <div class="row g-4">
                    <div class="col-lg-8"><div class="card shadow-sm p-3"><h5>Standings</h5><div id="cl-table">Loading...</div></div></div>
                    <div class="col-lg-4"><div class="card shadow-sm p-3"><h5>Top Scorers</h5><div id="cl-scorers">Loading...</div></div></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
