<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Euro Football Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .crest { width: 20px; margin-right: 8px; vertical-align: middle; }
        .table-sm td, .table-sm th { font-size: 0.85rem; padding: 8px; }
        .nav-pills .nav-link.active { background-color: #0d6efd; color: white; }
        .nav-link { color: #333; cursor: pointer; }
        .card-header { font-weight: bold; background-color: #f8f9fa; }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand">⚽ Live Football Microsite</span>
        </div>
    </nav>

    <div class="container pb-5">
        <ul class="nav nav-pills mb-4 justify-content-center bg-white p-2 rounded shadow-sm" id="pills-tab" role="tablist">
            <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#pl">Premier League</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#laliga">La Liga</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#seriea">Serie A</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#bundes">Bundesliga</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#ligue1">Ligue 1</button></li>
        </ul>

        <div class="tab-content bg-white p-3 rounded shadow-sm">
            <div class="tab-pane fade show active" id="pl">
                <div class="row">
                    <div class="col-md-8"><h5>Standings</h5><div id="pl-table">Loading...</div></div>
                    <div class="col-md-4"><h5>Top Scorers</h5><div id="pl-scorers">Loading...</div></div>
                </div>
            </div>

            <div class="tab-pane fade" id="laliga">
                <div class="row">
                    <div class="col-md-8"><h5>Standings</h5><div id="laliga-table">Loading...</div></div>
                    <div class="col-md-4"><h5>Top Scorers</h5><div id="laliga-scorers">Loading...</div></div>
                </div>
            </div>

            <div class="tab-pane fade" id="seriea">
                <div class="row">
                    <div class="col-md-8"><h5>Standings</h5><div id="seriea-table">Loading...</div></div>
                    <div class="col-md-4"><h5>Top Scorers</h5><div id="seriea-scorers">Loading...</div></div>
                </div>
            </div>

            <div class="tab-pane fade" id="bundes">
                <div class="row">
                    <div class="col-md-8"><h5>Standings</h5><div id="bundes-table">Loading...</div></div>
                    <div class="col-md-4"><h5>Top Scorers</h5><div id="bundes-scorers">Loading...</div></div>
                </div>
            </div>

            <div class="tab-pane fade" id="ligue1">
                <div class="row">
                    <div class="col-md-8"><h5>Standings</h5><div id="ligue1-table">Loading...</div></div>
                    <div class="col-md-4"><h5>Top Scorers</h5><div id="ligue1-scorers">Loading...</div></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
