<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Big 5 Football Standings</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --green: #3fb950;
      --orange: #d29922;
      --red: #f85149;
      --purple: #bc8cff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1.2rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header h1 { font-size: 1.3rem; font-weight: 700; }
    header span { font-size: 1.5rem; }
    .last-updated { margin-left: auto; font-size: 0.75rem; color: var(--muted); }

    /* League tabs */
    .tabs {
      display: flex;
      gap: 0.5rem;
      padding: 1rem 2rem 0;
      overflow-x: auto;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .tab {
      padding: 0.6rem 1.2rem;
      border: none;
      border-bottom: 3px solid transparent;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      white-space: nowrap;
      transition: color 0.2s, border-color 0.2s;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab .flag { margin-right: 0.4rem; }

    /* Main content */
    main { max-width: 1100px; margin: 0 auto; padding: 2rem; }

    .league-section { display: none; }
    .league-section.active { display: block; }

    .league-header {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 1.5rem;
    }
    .league-header h2 { font-size: 1.5rem; }
    .league-badge { font-size: 2rem; }

    /* Sub-tabs */
    .sub-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.2rem;
    }
    .sub-tab {
      padding: 0.4rem 1rem;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 600;
      transition: all 0.2s;
    }
    .sub-tab:hover { color: var(--text); border-color: var(--accent); }
    .sub-tab.active { background: var(--accent); border-color: var(--accent); color: #0d1117; }

    /* Tables */
    .table-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    thead th {
      background: var(--surface);
      padding: 0.75rem 0.8rem;
      text-align: left;
      font-weight: 600;
      color: var(--muted);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }
    tbody tr { border-top: 1px solid var(--border); transition: background 0.15s; }
    tbody tr:hover { background: rgba(255,255,255,0.04); }
    tbody td { padding: 0.7rem 0.8rem; }
    .pos { color: var(--muted); font-weight: 600; width: 2rem; }
    .team-cell { display: flex; align-items: center; gap: 0.6rem; font-weight: 600; }
    .crest { width: 22px; height: 22px; object-fit: contain; }
    .pts { font-weight: 700; color: var(--text); }
    .num { color: var(--muted); }

    /* Color indicators */
    .ucl { border-left: 3px solid var(--accent); }
    .uel { border-left: 3px solid var(--green); }
    .uecl { border-left: 3px solid var(--orange); }
    .rel { border-left: 3px solid var(--red); }

    /* Legend */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-top: 0.8rem;
      font-size: 0.75rem;
      color: var(--muted);
    }
    .legend span { display: flex; align-items: center; gap: 0.4rem; }
    .dot { width: 10px; height: 10px; border-radius: 50%; }

    /* Scorer table */
    .scorer-rank { color: var(--muted); font-weight: 700; }
    .goals-badge {
      display: inline-block;
      background: rgba(88,166,255,0.15);
      color: var(--accent);
      border-radius: 12px;
      padding: 0.15rem 0.6rem;
      font-weight: 700;
    }
    .assists-badge {
      display: inline-block;
      background: rgba(63,185,80,0.15);
      color: var(--green);
      border-radius: 12px;
      padding: 0.15rem 0.6rem;
      font-weight: 700;
    }

    /* Spinner */
    .spinner-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 4rem; gap: 1rem; color: var(--muted); }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      background: rgba(248,81,73,0.1);
      border: 1px solid var(--red);
      border-radius: 8px;
      padding: 1.2rem;
      color: var(--red);
      font-size: 0.9rem;
    }

    /* Key legend color line */
    .line-ucl  { width: 12px; height: 12px; background: var(--accent); border-radius: 2px; }
    .line-uel  { width: 12px; height: 12px; background: var(--green); border-radius: 2px; }
    .line-uecl { width: 12px; height: 12px; background: var(--orange); border-radius: 2px; }
    .line-rel  { width: 12px; height: 12px; background: var(--red); border-radius: 2px; }

    @media (max-width: 600px) {
      main { padding: 1rem; }
      .tabs { padding: 0.8rem 1rem 0; }
      thead th.hide-mobile, tbody td.hide-mobile { display: none; }
    }
  </style>
</head>
<body>

<header>
  <span>⚽</span>
  <h1>Big 5 Football Standings</h1>
  <div class="last-updated" id="lastUpdated">Loading…</div>
</header>

<div class="tabs" id="tabs">
  <button class="tab active" data-league="PL"   onclick="switchLeague('PL',this)"><span class="flag">🏴󠁧󠁢󠁥󠁮󠁧󠁿</span>Premier League</button>
  <button class="tab" data-league="SA"   onclick="switchLeague('SA',this)"><span class="flag">🇮🇹</span>Serie A</button>
  <button class="tab" data-league="PD"   onclick="switchLeague('PD',this)"><span class="flag">🇪🇸</span>La Liga</button>
  <button class="tab" data-league="BL1"  onclick="switchLeague('BL1',this)"><span class="flag">🇩🇪</span>Bundesliga</button>
  <button class="tab" data-league="FL1"  onclick="switchLeague('FL1',this)"><span class="flag">🇫🇷</span>Ligue 1</button>
</div>

<main id="main">
  <div id="content">
    <div class="spinner-wrap"><div class="spinner"></div><p>Fetching latest data…</p></div>
  </div>
</main>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
// Replace with your free API key from https://www.football-data.org/
const API_KEY = '40b3199e32604ef18db495c325f73be4';
const BASE    = 'https://api.football-data.org/v4';

const LEAGUES = {
  PL:  { name: 'Premier League', flag: '🏴󠁧󠁢󠁥󠁮󠁧󠁿', ucl: 4, uel: 5, uecl: 6, rel: 3 },
  SA:  { name: 'Serie A',        flag: '🇮🇹', ucl: 4, uel: 5, uecl: 6, rel: 3 },
  PD:  { name: 'La Liga',        flag: '🇪🇸', ucl: 4, uel: 5, uecl: 6, rel: 3 },
  BL1: { name: 'Bundesliga',     flag: '🇩🇪', ucl: 4, uel: 5, uecl: 6, rel: 2 },
  FL1: { name: 'Ligue 1',        flag: '🇫🇷', ucl: 3, uel: 4, uecl: 5, rel: 2 },
};

// ─── STATE ───────────────────────────────────────────────────────────────────
const cache  = {};
let activeLeague  = 'PL';
let activeSubTab  = 'standings'; // standings | scorers | assists

// ─── API ─────────────────────────────────────────────────────────────────────
async function fetchLeague(code) {
  if (cache[code]) return cache[code];
  const headers = { 'X-Auth-Token': API_KEY };
  const [standingsRes, scorersRes] = await Promise.all([
    fetch(`${BASE}/competitions/${code}/standings`, { headers }),
    fetch(`${BASE}/competitions/${code}/scorers?limit=20`,  { headers }),
  ]);
  if (!standingsRes.ok) throw new Error(`API error ${standingsRes.status}: ${await standingsRes.text()}`);
  const standings = await standingsRes.json();
  const scorers   = await scorersRes.json();
  cache[code] = { standings, scorers };
  return cache[code];
}

// ─── RENDER HELPERS ──────────────────────────────────────────────────────────
function rowClass(pos, cfg) {
  if (pos <= cfg.ucl)             return 'ucl';
  if (pos <= cfg.ucl + 1)        return 'uel';
  if (pos <= cfg.ucl + 2)        return 'uecl';
  const total = cfg._total || 20;
  if (pos > total - cfg.rel)     return 'rel';
  return '';
}

function crestImg(url, name) {
  return `<img class="crest" src="${url}" alt="${name}" onerror="this.style.display='none'" />`;
}

function renderStandings(table, cfg) {
  cfg._total = table.length;
  return `
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th class="pos">#</th>
          <th>Club</th>
          <th title="Played">P</th>
          <th title="Won" class="hide-mobile">W</th>
          <th title="Drawn" class="hide-mobile">D</th>
          <th title="Lost" class="hide-mobile">L</th>
          <th title="Goals For" class="hide-mobile">GF</th>
          <th title="Goals Against" class="hide-mobile">GA</th>
          <th title="Goal Difference">GD</th>
          <th>Pts</th>
          <th title="Last 5" class="hide-mobile">Form</th>
        </tr>
      </thead>
      <tbody>
        ${table.map(r => {
          const rc = rowClass(r.position, cfg);
          const form = (r.form || '').split(',').slice(-5).map(f =>
            f === 'W' ? `<span style="color:var(--green)">W</span>` :
            f === 'D' ? `<span style="color:var(--orange)">D</span>` :
                        `<span style="color:var(--red)">L</span>`
          ).join(' ');
          return `
          <tr class="${rc}">
            <td class="pos">${r.position}</td>
            <td><div class="team-cell">${crestImg(r.team.crest, r.team.name)}<span>${r.team.shortName || r.team.name}</span></div></td>
            <td class="num">${r.playedGames}</td>
            <td class="num hide-mobile">${r.won}</td>
            <td class="num hide-mobile">${r.draw}</td>
            <td class="num hide-mobile">${r.lost}</td>
            <td class="num hide-mobile">${r.goalsFor}</td>
            <td class="num hide-mobile">${r.goalsAgainst}</td>
            <td class="num">${r.goalDifference > 0 ? '+' : ''}${r.goalDifference}</td>
            <td class="pts">${r.points}</td>
            <td class="hide-mobile" style="letter-spacing:0.2em;font-size:0.75rem">${form}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>
  <div class="legend">
    <span><div class="line-ucl"></div> Champions League</span>
    <span><div class="line-uel"></div> Europa League</span>
    <span><div class="line-uecl"></div> Conference League</span>
    <span><div class="line-rel"></div> Relegation</span>
  </div>`;
}

function renderScorers(scorers, type) {
  // type: 'goals' or 'assists'
  const sorted = [...scorers].sort((a, b) =>
    type === 'goals'
      ? (b.goals || 0) - (a.goals || 0)
      : (b.assists || 0) - (a.assists || 0)
  ).slice(0, 15);

  return `
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th class="pos">#</th>
          <th>Player</th>
          <th>Club</th>
          <th title="Nationality" class="hide-mobile">Nat.</th>
          <th>${type === 'goals' ? '⚽ Goals' : '🅰️ Assists'}</th>
          <th title="Appearances" class="hide-mobile">Apps</th>
        </tr>
      </thead>
      <tbody>
        ${sorted.map((s, i) => `
          <tr>
            <td class="scorer-rank">${i + 1}</td>
            <td><strong>${s.player.name}</strong></td>
            <td><div class="team-cell">${crestImg(s.team.crest, s.team.name)}<span>${s.team.shortName || s.team.name}</span></div></td>
            <td class="hide-mobile">${s.player.nationality || '—'}</td>
            <td>
              ${type === 'goals'
                ? `<span class="goals-badge">${s.goals ?? 0}</span>`
                : `<span class="assists-badge">${s.assists ?? 0}</span>`
              }
            </td>
            <td class="num hide-mobile">${s.playedMatches ?? '—'}</td>
          </tr>`
        ).join('')}
      </tbody>
    </table>
  </div>`;
}

function subTabBar(league) {
  return `
  <div class="sub-tabs">
    <button class="sub-tab ${activeSubTab==='standings'?'active':''}" onclick="switchSub('standings','${league}')">📊 Standings</button>
    <button class="sub-tab ${activeSubTab==='scorers'  ?'active':''}" onclick="switchSub('scorers','${league}')">⚽ Top Scorers</button>
    <button class="sub-tab ${activeSubTab==='assists'  ?'active':''}" onclick="switchSub('assists','${league}')">🅰️ Top Assists</button>
  </div>`;
}

// ─── MAIN RENDER ─────────────────────────────────────────────────────────────
async function renderLeague(code) {
  const el  = document.getElementById('content');
  const cfg = LEAGUES[code];

  el.innerHTML = `<div class="spinner-wrap"><div class="spinner"></div><p>Loading ${cfg.name}…</p></div>`;

  try {
    const { standings, scorers } = await fetchLeague(code);
    const table = standings.standings[0].table;
    const sc    = scorers.scorers || [];

    let body = '';
    if (activeSubTab === 'standings') body = renderStandings(table, cfg);
    else if (activeSubTab === 'scorers')   body = renderScorers(sc, 'goals');
    else                                   body = renderScorers(sc, 'assists');

    el.innerHTML = `
      <div class="league-section active">
        <div class="league-header">
          <span class="league-badge">${cfg.flag}</span>
          <h2>${cfg.name}</h2>
        </div>
        ${subTabBar(code)}
        ${body}
      </div>`;

    document.getElementById('lastUpdated').textContent =
      'Updated: ' + new Date().toLocaleString();
  } catch (err) {
    el.innerHTML = `
      <div class="error-box">
        <strong>⚠️ Could not load data.</strong><br/><br/>
        ${err.message}<br/><br/>
        Make sure you have replaced <code>YOUR_API_KEY_HERE</code> with your free API key from
        <a href="https://www.football-data.org/" target="_blank" style="color:var(--accent)">football-data.org</a>.
      </div>`;
  }
}

// ─── NAVIGATION ──────────────────────────────────────────────────────────────
function switchLeague(code, btn) {
  activeLeague = code;
  activeSubTab = 'standings';
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderLeague(code);
}

function switchSub(sub, code) {
  activeSubTab = sub;
  renderLeague(code);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderLeague('PL');
</script>
</body>
</html>
